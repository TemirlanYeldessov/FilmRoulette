name: Build Android APK

# Manual trigger: open the Actions tab → "Build Android APK" → "Run workflow".
# Builds a standalone, installable release APK in the cloud (free GitHub runner)
# and uploads it as a downloadable artifact. No EAS build credits used.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      # Generate the native android/ project from the Expo config.
      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_TMDB_TOKEN: ${{ secrets.EXPO_PUBLIC_TMDB_TOKEN }}
          EXPO_PUBLIC_GROQ_KEY: ${{ secrets.EXPO_PUBLIC_GROQ_KEY }}

      # Release build bundles the JS and (per Expo's template) signs with the
      # debug keystore, so the APK installs and runs without a custom keystore.
      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_TMDB_TOKEN: ${{ secrets.EXPO_PUBLIC_TMDB_TOKEN }}
          EXPO_PUBLIC_GROQ_KEY: ${{ secrets.EXPO_PUBLIC_GROQ_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: filmroulette-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
